# ==========================================================
# Konfiguracja Nav2 (Humble) oparta na parametrach z dwa.py
# ==========================================================

# ----------------- KONTROLER (Zastępuje dwa.py) -----------------
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Konfiguracja sprawdzenia celu (zastępuje "near_target_pos = 0.3")
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.25

    # DWB Local Planner (odpowiednik Twojego DWA)
    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      
      # Zmienne kinematyczne z dwa.py
      min_vel_x: -0.0541
      max_vel_x: 0.0541
      min_vel_y: 0.0
      max_vel_y: 0.0
      max_vel_theta: 0.731
      min_speed_xy: 0.0
      max_speed_xy: 0.0541
      min_speed_theta: 0.0
      
      # Przyspieszenia z dwa.py
      acc_lim_x: 0.1
      acc_lim_y: 0.0
      acc_lim_theta: 3.5
      decel_lim_x: -0.1
      decel_lim_y: 0.0
      decel_lim_theta: -3.5
      
      # Symulacja trajektorii
      sim_time: 5.0 # Z Twojego predict_time (UWAGA: 5.0 może mocno obciążyć Jetsona, zalecam ok. 1.5 - 2.0)
      vx_samples: 20
      vy_samples: 1
      vtheta_samples: 20
      
      # Wagi (Krytycy DWB - odpowiednik Twoich w_heading, w_clearance, w_velocity)
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.5   # Odpowiednik: w_clearance
      PathAlign.scale: 32.0     # Promowanie trzymania się ścieżki (związane z w_heading)
      GoalAlign.scale: 24.0     # Promowanie patrzenia na cel
      PathDist.scale: 32.0      # Promowanie w_velocity (jazda do przodu po ścieżce)
      GoalDist.scale: 24.0

# ----------------- PLANER GLOBALNY (Zastępuje a_star.py) -----------------
planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner" # Szybka i zoptymalizowana wersja A*/Dijkstry
      tolerance: 0.5
      use_astar: True

# ----------------- DRZEWO ZACHOWAŃ (Zastępuje pętlę i wykrywanie utknięć) -----------------
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 20
    # Domyślne drzewo zachowań do nawigacji, zawiera gotowe wykrywanie utknięć ("stuck recovery")
    default_nav_to_pose_bt_xml: "replace_with_default_nav_to_pose" 

# ----------------- GLOBALNA MAPA KOSZTÓW (Global Costmap) -----------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      robot_radius: 0.17 # Z dwa.py
      resolution: 0.05
      track_unknown_space: True # Ważne do automatycznej eksploracji!
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          raytrace_max_range: 3.0 # Z dwa.py (lidar_max_range)
          obstacle_max_range: 3.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.12 # Z dwa.py
        cost_scaling_factor: 3.0

# ----------------- LOKALNA MAPA KOSZTÓW (Local Costmap) -----------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 3.0
      height: 3.0
      resolution: 0.05
      robot_radius: 0.17 # Z dwa.py
      plugins: ["voxel_layer", "inflation_layer"]
      
      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          raytrace_max_range: 3.0 # Z dwa.py
          obstacle_max_range: 3.0
          
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.12 # Z dwa.py
        cost_scaling_factor: 3.0